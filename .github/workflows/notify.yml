name: Telegram homework notifications

on:
  schedule:
    - cron: '0 22 * * *'    # 22:00 UTC = 05:00 Bangkok — morning summary
    - cron: '30 13 * * *'   # 13:30 UTC = 20:30 Bangkok — tomorrow planning
  workflow_dispatch:        # allow manual run from the Actions tab

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Pick mode from schedule
        id: mode
        run: |
          if [ "${{ github.event.schedule }}" = "0 22 * * *" ]; then
            echo "mode=morning" >> "$GITHUB_OUTPUT"
          else
            echo "mode=evening" >> "$GITHUB_OUTPUT"
          fi
      - name: Ping notify endpoint
        run: |
          MODE="${{ steps.mode.outputs.mode }}"
          # manual runs (no schedule) default to evening
          MODE="${MODE:-evening}"
          echo "Triggering $MODE notification"
          curl -fsS --retry 3 --retry-delay 10 \
            "https://ryujis-homework-tracker.vercel.app/api/notify?mode=$MODE"
